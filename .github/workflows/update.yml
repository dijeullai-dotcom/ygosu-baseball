name: Update Baseball Ranking

on:
  schedule:
    # 10분마다 자동으로 실행 (시간은 깃허브 서버 상황에 따라 1~2분 오차가 있을 수 있음)
    - cron: '*/10 * * * *'
  workflow_dispatch: # 원할 때 수동으로 버튼을 눌러서 실행할 수 있게 하는 옵션

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run analyzer script
        env:
          YGOSU_COOKIE: ${{ secrets.YGOSU_COOKIE }}
        run: python ygosu_analyzer.py

      - name: Commit and Push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Auto-update baseball ranking" || exit 0
          git push
